<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS地図</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

html,body{
    margin:0;
    padding:0;
}

#map{
    height:100vh;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;

    background:white;
    padding:10px;
    border-radius:10px;
}

#fileInput{
    position:absolute;
    top:100px;
    left:10px;
    z-index:1000;

    background:white;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<div id="info">
GPS取得中...
</div>

<!-- ファイル選択 -->
<input type="file" id="fileInput">

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 地図生成
const map = L.map('map').setView([35.42,132.76],12);

// 国土地理院
L.tileLayer(
'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
{
 attribution:'国土地理院'
}
).addTo(map);

// 赤アイコン
const redIcon = new L.Icon({

    iconUrl:
    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

    shadowUrl:
    'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]

});

// GPS現在地
navigator.geolocation.getCurrentPosition(

function(position){

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    // 現在地へ移動
    map.setView([lat,lng],14);

    // 現在地ピン
    L.marker(
        [lat,lng],
        {icon:redIcon}
    )
    .addTo(map)
    .bindPopup("現在地")
    .openPopup();

    document.getElementById('info').innerHTML =
    `
    現在地<br>
    緯度:${lat}<br>
    経度:${lng}
    `;

},

function(error){

    console.log(error);

    document.getElementById('info').innerHTML =
    'GPS取得失敗';

}

);

// ファイル選択
document.getElementById('fileInput')
.addEventListener('change',function(event){

    const file = event.target.files[0];

    if(!file){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const text = e.target.result;

        // 行分割
        const lines = text.trim().split('\n');

        // 座標保存
        const linePoints = [];

        lines.forEach((line,index)=>{

            const parts = line.split(',');

            // memo
            const memo = parts[0];

            // 緯度経度
            const lat = parseFloat(parts[1]);
            const lng = parseFloat(parts[2]);

            // 配列へ
            linePoints.push([lat,lng]);

            // marker作成
            const marker = L.marker([lat,lng])
                .addTo(map);

            // popup
            marker.bindPopup(
                `
                ${memo || "メモなし"}<br>
                緯度:${lat}<br>
                経度:${lng}
                `
            );

            // メモ常時表示
            if(memo){

                marker.bindTooltip(
                    memo,
                    {
                        permanent:true,
                        direction:'top',
                        offset:[0,-20]
                    }
                );

            }

        });

        // 赤線
        L.polyline(
            linePoints,
            {
                color:'red'
            }
        ).addTo(map);

        // 最初へ移動
        if(linePoints.length > 0){

            map.setView(linePoints[0],13);

        }

    };

    // ファイル読込
    reader.readAsText(file);

});

</script>

</body>
</html>
